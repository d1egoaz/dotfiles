file_opener = "cursor"
model = "gpt-5.4"
model_reasoning_effort = "medium"
model_verbosity = "medium"
notify = ["/bin/sh", "-c", "$HOME/dotfiles/bin/files/codex-notify.sh \"$1\"", "codex-notify"]
personality = "pragmatic"
approval_policy = "untrusted"
allow_login_shell = false
model_context_window = 1050000
model_auto_compact_token_limit = 800000

# sandbox_mode = "read-only"
sandbox_mode = "workspace-write"
suppress_unstable_features_warning = true
web_search = "cached"

# You can also add custom .tmTheme files under $CODEX_HOME/themes.
theme = "tokyo-night"
plan_mode_reasoning_effort = "xhigh"
service_tier = "fast"

[agents]
max_threads = 10
max_depth = 1

[features]
multi_agent = true
prevent_idle_sleep = true
responses_websockets = false
responses_websockets_v2 = false
voice_transcription = true

[sandbox_workspace_write]
exclude_slash_tmp = false      # Allow /tmp
exclude_tmpdir_env_var = false # Allow $TMPDIR
network_access = false

[history]
persistence = "save-all"
max_bytes = 1073741824 # 1 GiB history cap

[tui]
animations = true
notification_method = "bel"
status_line = ["model-with-reasoning", "current-dir", "git-branch", "context-window-size", "used-tokens", "context-remaining", "context-used", "project-root"]
notifications = ["agent-turn-complete"]
theme = "tokyo-night"

[projects."/Users/diego/dotfiles"]
trust_level = "trusted"

[projects."/Users/diego/code/R2-Claw2"]
trust_level = "trusted"

[projects."/"]
trust_level = "trusted"

[plugins."github@openai-curated"]
enabled = true

[model_providers.z_ai]
# Name of the provider that will be displayed in the Codex UI.
name = "z.ai - GLM Coding Plan"
# The path `/chat/completions` will be amended to this URL to make the POST
# request for the chat completions.
base_url = "https://api.z.ai/api/coding/paas/v4"
env_key = "ZAI"
#env_key = "806d5a77475643828d7ef868dc27680a.7ai12jaQvV5NrjMqj"

[profiles.glm_5_1]
model = "glm-5.1"
model_provider = "z_ai"
