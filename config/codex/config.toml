# Shared cross-laptop defaults, safe to sync between personal and work laptops.
# Home Manager composes this with config/codex/profiles/<profile>.toml into ~/.codex/config.toml.
allow_login_shell = false

# Ask only when Codex needs to leave the sandbox or run a risky command.
approval_policy = "on-request"
file_opener = "cursor"
model = "gpt-5.5"
model_context_window = 1050000
model_reasoning_effort = "high"
model_verbosity = "medium"
# Notification sounds are handled by this helper; hook sounds live in hooks.json.
notify = [
    "/bin/sh",
    "-c",
    '$HOME/dotfiles/bin/files/codex-notify.sh "$1"',
    "codex-notify",
]
personality = "pragmatic"
plan_mode_reasoning_effort = "xhigh"
# Keep file writes scoped to trusted workspaces unless a command is escalated.
sandbox_mode = "workspace-write"
suppress_unstable_features_warning = true
theme = "tokyo-night"
web_search = "cached"

[features]
# Required for config/codex/hooks.json.
goals = true
hooks = true
memories = true
multi_agent = true
prevent_idle_sleep = true
responses_websockets = false
responses_websockets_v2 = false
voice_transcription = true
js_repl = false

# Agent limits for multi-agent work.
[agents]
max_depth = 1
max_threads = 10

# Keep enough local history for long debugging sessions.
[history]
max_bytes = 1073741824
persistence = "save-all"

# Workspace-write sandbox defaults.
[sandbox_workspace_write]
exclude_slash_tmp = false
exclude_tmpdir_env_var = false
# Keep network off by default; escalate per command when needed.
network_access = false

# Shared TUI preferences.
[tui]
animations = true
notification_method = "auto"
notification_condition = "always" # unfocused | always

# These payloads go through notify above, not hooks.json.
#notifications = true
notifications = ["agent-turn-complete"]
status_line = [
    "model-with-reasoning",
    "current-dir",
    "git-branch",
    "context-window-size",
    "used-tokens",
    "context-remaining",
    "context-used",
    "project-root",
]
theme = "tokyo-night"
terminal_title = ["spinner", "project", "app-name", "status", "thread", "model", "task-progress"]

[tui.model_availability_nux]
"gpt-5.5" = 4

# Environment inherited by tool commands. Claude-related variables are here so
# Claude Code launched from Codex shell tools follows the same local policy.
[shell_environment_policy]
inherit = "core"

[desktop]
appearanceTheme = "system"

[desktop.appearanceLightChromeTheme]
accent = "#339cff"
contrast = 45
ink = "#1a1c1f"
opaqueWindows = false
surface = "#ffffff"

[desktop.appearanceLightChromeTheme.fonts]
ui = "Atkinson Hyperlegible Next, PragmataPro"
code = "PragmataPro"

[desktop.appearanceLightChromeTheme.semanticColors]
diffAdded = "#00a240"
diffRemoved = "#ba2623"
skill = "#924ff7"

[desktop.appearanceDarkChromeTheme]
accent = "#339cff"
contrast = 45
ink = "#ffffff"
opaqueWindows = false
surface = "#181818"

[desktop.appearanceDarkChromeTheme.fonts]
ui = "Atkinson Hyperlegible Next, PragmataPro"
code = "PragmataPro"

[desktop.appearanceDarkChromeTheme.semanticColors]
diffAdded = "#40c977"
diffRemoved = "#fa423e"
skill = "#ad7bf9"
